<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Avenmark Code Playground</title>

    <meta 
        name="description" 
        content="Avenmark Code Playground - Write code and instantly preview websites."
    >


    <!-- Montserrat -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link 
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" 
        rel="stylesheet"
    >


    <link rel="stylesheet" href="style.css">

</head>



<body>


<!-- =========================
     HEADER
========================= -->

<header class="app-header">


    <div class="brand">


        <img
            src="Untitled design.png"
            alt="Avenmark Logo"
            class="logo"
        >


        <h1>
            Avenmark Code Playground
        </h1>


    </div>



    <button id="export-button">

        Export

    </button>


</header>






<!-- =========================
     WORKSPACE
========================= -->


<main class="workspace">





<!-- =========================
     FILES
========================= -->


<aside class="sidebar">


    <div class="sidebar-header">


        <h2>
            Project Files
        </h2>


        <button id="new-file-button">
            +
        </button>


    </div>



    <div 
        class="file-list"
        id="file-list"
    >


        <button
            class="file active"
            data-file="index.html"
        >
            index.html
        </button>



        <button
            class="file"
            data-file="style.css"
        >
            style.css
        </button>



        <button
            class="file"
            data-file="script.js"
        >
            script.js
        </button>


    </div>


</aside>







<!-- =========================
     CODE EDITOR
========================= -->


<section class="editor-section">


    <div class="editor-header">


        <h2 id="current-file">
            index.html
        </h2>


        <span>
            Editor
        </span>


    </div>



    <textarea
        id="code-editor"
        spellcheck="false"
        placeholder="Write your code here..."
    ></textarea>



</section>







<!-- =========================
     LIVE PREVIEW
========================= -->


<section class="preview-section">


    <div class="preview-header">


        <h2>
            Live Preview
        </h2>


        <button id="run-button">

            Run

        </button>


    </div>



    <iframe
        id="preview-frame"
        title="Live Website Preview"
    ></iframe>



</section>





</main>





<script src="script.js"></script>


</body>

</html>
